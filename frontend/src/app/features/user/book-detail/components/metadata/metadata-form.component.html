<div class="grid grid-cols-1 w-full gap-4">
  <p-fieldset
    [toggleable]="true"
    [collapsed]="false"
    legend="Metadata"
    styleClass="w-full rounded-xl! p-2! shadow-sm! border! border-gray-100! bg-white!">
    <form class="grid grid-cols-3 gap-3" [formGroup]="metadataForm">
      <!-- 1/3: Titolo -->
      <div class="library-input-group">
        <label class="library-input-label">Titolo Libro</label>
        <i class="pi pi-book"></i>
        <input pInputText formControlName="title" placeholder="Titolo..." class="library-input-field"/>
      </div>
      <!-- Editore -->
      <div class="library-input-group">
        <label class="library-input-label">Editore</label>
        <i class="pi pi-building"></i>
        <input pInputText formControlName="publisher" placeholder="Casa editrice..." class="library-input-field"/>
      </div>
      <!-- Autore -->
      <div class="library-input-group">
        <label class="library-input-label">Autore</label>
        <i class="pi pi-user"></i>
        <input pInputText formControlName="author" placeholder="Autore..." class="library-input-field"/>
      </div>
      <!-- ISBN -->
      <div class="library-input-group">
        <label class="library-input-label">Codice ISBN</label>
        <i class="pi pi-barcode"></i>
        <input pInputText formControlName="isbn" placeholder="ISBN..." class="library-input-field"/>
      </div>
      <!-- GENERE -->
      <div class="library-input-group">
        <label class="library-input-label">Categoria</label>
        <i class="pi pi-tag"></i>
        <p-multiSelect
          [options]="cat()"
          formControlName="categories"
          optionLabel="name"
          optionValue="id"
          placeholder="Seleziona categorie"
          class="library-input-field"
          display="chip">
        </p-multiSelect>
      </div>
      <!-- DATA PUBBLICAZIONE -->
      <div class="library-input-group">
        <label class="library-input-label">Data Pubblicazione</label>
        <i class="pi pi-calendar"></i>
        <p-datepicker
          formControlName="datePublished"
          dateFormat="dd/mm/yy"
          placeholder="Seleziona data"
          [showIcon]="false"
          appendTo="body"
          inputStyleClass="library-input-field"></p-datepicker>
      </div>
      <!-- DESCRIZIONE -->
      <div class="library-input-group col-span-2">
        <label class="library-input-label">Descrizione</label>
        <textarea class="library-input-field" rows="10" cols="30" pTextarea formControlName="description" [autoResize]="false" fluid></textarea>
      </div>
      <!-- UPLOAD -->
      @if(!isReadOnly()) {
        <div class="library-input-group grid-rows-2">
          <!-- UPLOAD COPERTINA -->
          <div class="library-input-group">
            <label class="library-input-label">Upload copertina</label>
            <p-fileupload mode="basic" chooseIcon="pi pi-upload" [multiple]="false" accept="image/*"  (onSelect)="onFileSelect($event, 'cover')" />
          </div>
          <!-- UPLOAD ANTEPRIMA -->
          <div class="library-input-group">
            <label class="library-input-label">Upload antemprima</label>
            <p-fileupload mode="basic" chooseIcon="pi pi-upload" [multiple]="true" accept="image/*"  (onSelect)="onFileSelect($event, 'previews')" />
          </div>
        </div>

        <!-- CHECKBOX PER LA VISUALIZZAZIONE IN MAPPA -->
        <div class="library-input-group col-span-2">
          <div class="grid-cols-2 gap-7">
            <p-checkbox binary="true" inputId="geo" formControlName="chkCoordinate" (onChange)="handleGeoLocation($event)" />
            <label for="geo" class="text-sm text-blue-800 cursor-pointer">
              Consento di rilevare la mia posizione per visualizzare il libro sulla mappa.
              <span class="font-semibold">(Le coordinate verranno approssimate per tutelare la tua privacy)</span>
            </label>
          </div>
        </div>
      }
    </form>
  </p-fieldset>
</div>

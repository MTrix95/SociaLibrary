<div class="p-6 bg-slate-50 min-h-screen flex items-center justify-center">
  <div class="max-w-2xl w-full bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">

    <!-- Intestazione -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h2 class="text-2xl font-bold text-slate-800">Generi</h2>
        <p class="text-slate-500">Distribuzione dei libri per categoria</p>
      </div>
      <div class="h-12 w-12 bg-blue-50 rounded-full flex items-center justify-center">
        <i class="pi pi-book text-blue-600 text-xl"></i>
      </div>
    </div>

    <!-- Contenitore -->
    <div class="relative" style="height: 400px;">
      <p-chart
        type="doughnut"
        [data]="dataCategory"
        [options]="optionsCategory" />
    </div>

    <!-- Statistica Rapida -->
    <div class="mt-8 pt-6 border-t border-slate-100 text-center">
      <p class="text-sm text-slate-400 uppercase tracking-wider font-semibold">
        Totale Categorie Visualizzate: {{dataCategory?.labels?.length || 0}}
      </p>
    </div>

  </div>
</div>
